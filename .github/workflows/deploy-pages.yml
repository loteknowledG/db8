name: Deploy db8 to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vp
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: false

      - name: Checkout realmorphism sibling dependency
        run: git clone --depth 1 https://github.com/loteknowledG/realmorphism ../realmorphism

      - name: Install dependencies
        run: vp install

      - name: Build static site
        env:
          DB8_BASE_PATH: /db8/
        run: vp build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
