<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>db8 button</title>
    <style>
      :root {
        --start: #39ff14;
        --start-dim: #13690a;
        --stop: #ff3a3a;
        --stop-dim: #8a1f1f;
        --bg: #111;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg);
        display: grid;
        place-items: center;
        font-family: monospace;
        color: white;
      }
    </style>
  </head>
  <body>
    <shadow-toggle-button></shadow-toggle-button>

    <script>
      class ShadowToggleButton extends HTMLElement {
        constructor() {
          super();
          this.running = false;
          this.pressed = false;
          this.attachShadow({ mode: "open" });
        }

        connectedCallback() {
          this.render();
        }

        render() {
          const stateClass = this.running ? "state-stop" : "state-start";
          const art = this.pressed
            ? this.running
              ? `\n   ┌──────┐\n   │ STOP │\n   └──────┘`
              : `\n   ┌───────┐\n   │ START │\n   └───────┘`
            : this.running
              ? `  ┌──────┐\n  │ STOP │▒\n  └──────┘▒\n   ▒▒▒▒▒▒▒`
              : `  ┌───────┐\n  │ START │▒\n  └───────┘▒\n   ▒▒▒▒▒▒▒▒`;

          this.shadowRoot.innerHTML = `
          <style>
            :host {
              display: inline-block;
              user-select: none;
            }

            button {
              all: unset;
              display: block;
              cursor: pointer;
              font-family: monospace;
              font-size: 32px;
              line-height: 1.1;
              white-space: pre;
              margin: 0;
              transition:
                color 0.12s ease,
                transform 0.08s ease,
                text-shadow 0.12s ease;
            }

            button:hover {
              transform: translateY(-1px);
            }

            button:active {
              transform: translate(2px, 2px);
            }

            .state-start {
              color: var(--start);
              text-shadow: 0 0 10px rgba(57, 255, 20, 0.22);
            }

            .state-stop {
              color: var(--stop);
              text-shadow: 0 0 10px rgba(255, 58, 58, 0.22);
            }

            .dim-start {
              color: var(--start-dim);
            }

            .dim-stop {
              color: var(--stop-dim);
            }
          </style>
          <button
            class="${stateClass}"
            role="button"
            tabindex="0"
            aria-pressed="${String(this.running)}"
            type="button"
          >${art}</button>
        `;

          const button = this.shadowRoot.querySelector("button");

          button.addEventListener("mousedown", () => {
            this.pressed = true;
            this.render();
          });

          button.addEventListener("mouseup", () => {
            if (!this.pressed) return;
            this.pressed = false;
            this.running = !this.running;
            this.render();
          });

          button.addEventListener("mouseleave", () => {
            this.pressed = false;
            this.render();
          });

          button.addEventListener(
            "touchstart",
            (event) => {
              event.preventDefault();
              this.pressed = true;
              this.render();
            },
            { passive: false },
          );

          button.addEventListener("touchend", () => {
            if (!this.pressed) return;
            this.pressed = false;
            this.running = !this.running;
            this.render();
          });

          button.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              this.pressed = true;
              this.render();
              this.pressed = false;
              this.running = !this.running;
              this.render();
            }
          });
        }
      }

      customElements.define("shadow-toggle-button", ShadowToggleButton);
    </script>
  </body>
</html>
